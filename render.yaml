services:
  - type: web
    name: trade-workbench-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: python start.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: trade-workbench-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN.vercel.app

databases:
  - name: trade-workbench-db
    plan: starter
    databaseName: trade_workbench
    user: trade_user
